<svg xmlns="http://www.w3.org/2000/svg" width="320" height="320" viewBox="0 0 100 100" role="img">
    <title>dpbox</title>
    <!-- background fill same as bowl fill -->
    <circle cx="50" cy="50" r="48" fill="#DAE0E8" />
    <!-- d + p: shared bowl; p stem left, d stem right -->
    <g stroke="#1A8CFF" stroke-width="10" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="50" cy="50" r="22" fill="#FFFFFF" />
        <line x1="28" y1="50" x2="28" y2="78" />
        <line x1="72" y1="22" x2="72" y2="50" />
    </g>
</svg>
